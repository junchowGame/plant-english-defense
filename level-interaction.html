<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>植物英语小队 - 关卡内互动系统</title>
    <link rel="stylesheet" href="./styles/level-interaction.css" />
  </head>
  <body>
    <main id="app" aria-label="关卡内互动系统">
      <section class="stage screen loading is-active" data-screen="loading">
        <button class="icon-btn exit-btn" data-action="pause" aria-label="暂停">×</button>
        <div class="loading-copy">
          <p class="eyebrow">Level 1</p>
          <h1>植物英语小队</h1>
          <p>听一听，点一点，再用你的声音保护小院。</p>
        </div>
        <img class="load-ill" src="./public/assets/level-interaction/ui/ui_load_ill_001.png" alt="" />
        <div class="load-panel">
          <div class="load-bar" aria-label="加载进度">
            <span id="loadFill"></span>
          </div>
          <button class="primary-btn" data-action="start-click">开始</button>
        </div>
      </section>

      <section class="stage screen click-game" data-screen="click">
        <button class="icon-btn exit-btn" data-action="pause" aria-label="暂停">×</button>
        <div class="top-hud">
          <div>
            <p class="eyebrow">Listen and choose</p>
            <h2 id="clickPrompt">听声音，选择图片</h2>
          </div>
          <div class="progress-pill"><span id="clickRound">1</span>/6</div>
        </div>
        <div class="context-panel">
          <img src="./public/assets/level-interaction/art/art_dialogue_thank_001.png" alt="" />
        </div>
        <div id="cardRow" class="card-row" aria-live="polite"></div>
        <div class="bottom-actions">
          <button class="round-btn" data-action="replay-click" aria-label="重播英文">
            <span class="speaker-mark"></span>
          </button>
        </div>
      </section>

      <section class="stage screen comic" data-screen="comic">
        <button class="icon-btn exit-btn" data-action="pause" aria-label="暂停">×</button>
        <div class="comic-strip">
          <figure>
            <img src="./public/assets/level-interaction/art/art_comic_transition_001.png" alt="" />
          </figure>
          <figure>
            <img src="./public/assets/level-interaction/art/art_comic_transition_002.png" alt="" />
          </figure>
        </div>
        <div class="comic-caption">
          <h2>声音准备好了，小院也准备好了。</h2>
          <button class="primary-btn" data-action="start-yard">去小院</button>
        </div>
      </section>

      <section class="stage screen yard" data-screen="yard">
        <button class="icon-btn exit-btn" data-action="pause" aria-label="暂停">×</button>
        <div class="yard-hud">
          <div class="sun-counter">
            <img src="./public/assets/level-interaction/art/icon_sys_sun_001_256.png" alt="" />
            <span id="sunCount">0</span>
          </div>
          <div class="repeat-count">跟读 <span id="speakCount">0</span>/5</div>
        </div>
        <div class="speak-panel">
          <p class="eyebrow">Say it aloud</p>
          <h2 id="yardPrompt">Say: Hello!</h2>
          <p id="yardHint">听完后按住麦克风说一遍。</p>
        </div>
        <div id="yardField" class="yard-field">
          <div class="slots" id="slots"></div>
          <div id="plantSprite" class="sprite plant-sprite hidden" data-sprite="peashooter-idle"></div>
          <div id="zombieSprite" class="sprite zombie-sprite entering" data-sprite="bucket-spawn"></div>
          <img id="projectile" class="projectile hidden" src="./public/assets/level-interaction/art/icon_sys_projectile_001.png" alt="" />
          <img id="sunFly" class="sun-fly hidden" src="./public/assets/level-interaction/art/icon_sys_sun_001_256.png" alt="" />
        </div>
        <div class="yard-actions">
          <button class="round-btn small" data-action="replay-yard" aria-label="重播英文">
            <span class="speaker-mark"></span>
          </button>
          <button id="micBtn" class="mic-btn" data-action="mic" aria-label="按住说话">
            <span class="mic-icon"></span>
          </button>
        </div>
      </section>

      <section class="stage screen result" data-screen="result">
        <div class="result-mask"></div>
        <div class="result-panel" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
          <p class="eyebrow">Level complete</p>
          <h2 id="resultTitle">Great!</h2>
          <div id="stars" class="stars" aria-label="三星通关">
            <span>★</span><span>★</span><span>★</span>
          </div>
          <div class="result-sun">
            <img src="./public/assets/level-interaction/art/icon_sys_sun_001_256.png" alt="" />
            <span>× <strong id="resultSun">5</strong></span>
          </div>
          <div class="result-stats">
            <span>图片正确率 <strong id="resultClickRate">100%</strong></span>
            <span>跟读成功率 <strong>100%</strong></span>
          </div>
          <div class="result-actions">
            <button class="secondary-btn" data-action="map">回章节地图</button>
            <button class="secondary-btn" data-action="restart">再玩一次</button>
            <button class="primary-btn" data-action="next">下一关</button>
          </div>
        </div>
      </section>

      <div id="pauseModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="pauseTitle">
        <div class="modal-panel">
          <h2 id="pauseTitle">暂停一下</h2>
          <p>现在离开不会保存本次进度。</p>
          <div class="modal-actions">
            <button class="secondary-btn" data-action="resume">继续</button>
            <button class="primary-btn" data-action="map">回章节地图</button>
          </div>
        </div>
      </div>

      <div id="toast" class="toast hidden" aria-live="polite"></div>
    </main>
    <script src="./src/level-interaction.js"></script>
  </body>
</html>
